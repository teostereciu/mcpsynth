# ==============================================================================
# SETUP DIFFICULTY
# ==============================================================================

setup_difficulty: "EASY"
setup_time_estimate: "5-10 minutes (first time)"
setup_complexity_notes: |
  Notion setup is straightforward:

  1. ACCOUNT SIGNUP (2 min):
     - Email address
     - Password
     - Email verification
     - No credit card required
     - Free plan is sufficient

  2. WORKSPACE SETUP (1 min):
     - Automatically created on signup
     - You are the admin
     - Can create unlimited pages/databases on free plan

  3. CREATE INTEGRATION (2 min):
     - Go to https://www.notion.so/my-integrations
     - Click "New integration"
     - Name it, select workspace
     - Choose capabilities (read, write, comment)
     - Copy secret token

  4. SHARE CONTENT WITH INTEGRATION (2 min):
     - Create test page or database
     - Click "..." menu → "Connections"
     - Add your integration
     - Integration can now access this page

  5. START TESTING (immediate):
     - Use token in Authorization header
     - All 93 endpoints immediately available
     - Create pages, query databases, etc.

  Compared to other APIs:
    - Stripe: 2 min (simplest!) ⭐⭐⭐
    - Notion: 5 min (easy) ⭐⭐
    - GitHub: 5 min (simple PAT) ⭐⭐
    - Zulip: 5 min (bot creation) ⭐⭐
    - eBay: 20 min (OAuth flow) ⭐⭐
    - Amazon SP-API: 45-60 min (complex multi-step) ⭐⭐⭐⭐⭐

  Extra step vs GitHub/Stripe: Must share pages with integration

# ==============================================================================
# NOTION-SPECIFIC NOTES
# ==============================================================================

notion_specific:
  api_version_header: |
    Notion requires Notion-Version header:
      - Current version: "2022-06-28"
      - Header: "Notion-Version: 2022-06-28"
      - Tests expect this version
      - Other versions may work but not guaranteed

  id_format: |
    Notion uses UUID format for IDs:
      - Page IDs: "e7f2d1c3-4a5b-6c7d-8e9f-0a1b2c3d4e5f"
      - Database IDs: Same UUID format
      - Block IDs: Same UUID format
      - Hyphens optional in API (can omit)

  object_types: |
    Notion returns typed objects:
      - Page: {"object": "page", ...}
      - Database: {"object": "database", ...}
      - Block: {"object": "block", ...}
      - Error: {"object": "error", ...}
      - Always check "object" field first

  rich_text: |
    Notion uses rich_text for all text content:
      - Format: [{"text": {"content": "text"}}]
      - NOT plain strings
      - Required for titles, properties, blocks
      - Tests expect proper rich_text format

  property_types: |
    Database properties are strongly typed:
      - title, rich_text, number, select, multi_select
      - checkbox, date, url, email, phone_number
      - files, relation, rollup, formula, etc.
      - Must match schema when creating/updating

  pagination: |
    Notion uses cursor-based pagination:
      - Results limited to 100 per page
      - has_more: true if more results
      - next_cursor: Use for next page
      - Query database can return 100+ results

