# ==============================================================================
# SECURITY NOTES
# ==============================================================================

security:
  api_key_storage: |
    - Store token in .env file (gitignored)
    - Never commit API tokens to version control
    - Use environment variables in production
    - Token starts with secret_
    - Integration secrets page: https://www.notion.so/my-integrations

  token_scope: |
    - Internal integrations are workspace-scoped
    - Token only works for associated workspace
    - Cannot access other workspaces
    - No cross-workspace data leakage

  permissions: |
    - Capabilities set at integration creation:
      - Read content
      - Update content
      - Insert content
      - Read/Insert comments (optional)
    - Permissions apply to all pages integration can access
    - Use principle of least privilege

  safe_testing: |
    - Recommended: Use dedicated test workspace
    - Integrations can't access pages until explicitly shared
    - Automatic cleanup keeps workspace clean
    - Can always view/restore from Trash
    - No billing impact (API calls are free)

  sharing_model: |
    - Pages/databases are private by default
    - Must explicitly "Add connection" to each page
    - Or share parent page (children inherit)
    - Integration sees only explicitly shared content
    - Tests will fail with object_not_found if not shared

