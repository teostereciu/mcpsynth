# ==============================================================================
# COMMON ISSUES
# ==============================================================================

common_issues:
  object_not_found:
    error: "404 object_not_found"
    cause: "Integration not shared with page/database"
    fix: "Open page → ... menu → Connections → Add your integration"

  unauthorized:
    error: "401 unauthorized"
    cause: "Invalid or missing API key"
    fix: "Check NOTION_API_KEY in .env starts with ntn_"

  validation_error:
    error: "400 validation_error"
    cause: "Invalid request format (missing required fields, wrong types)"
    fix: "Check API reference for correct request format"

  conflict_error:
    error: "409 conflict_error"
    cause: "Page already exists, or conflicting update"
    fix: "Use unique titles, check page doesn't already exist"

  rate_limited:
    error: "429 rate_limited"
    cause: "Exceeded 3 requests/second"
    fix: "Add delays between requests, implement backoff"

  missing_capabilities:
    error: "403 Permission denied"
    cause: "Integration lacks required capability"
    fix: "Update integration capabilities at https://www.notion.so/my-integrations"
