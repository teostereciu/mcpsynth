# Notion API Real API Testing Configuration
#
# This config defines what's needed to test the Notion MCP server against
# the real Notion API.

api_name: "Notion"
api_version: "API 2022-06-28"
test_suite: "tests/test_scenarios.py"

# ==============================================================================
# REQUIRED CREDENTIALS
# ==============================================================================

required_credentials:
  NOTION_API_KEY:
    description: "Notion Internal Integration Secret"
    how_to_get:
      url: "https://www.notion.so/my-integrations"
      steps:
        - "Step 1: Create Notion Account"
        - "  - Sign up at https://www.notion.so"
        - "  - Verify your email address"
        - "  - Complete onboarding"
        - ""
        - "Step 2: Create Workspace (if not exists)"
        - "  - You are automatically the admin of your workspace"
        - "  - Can create pages, databases, invite members, etc."
        - ""
        - "Step 3: Create Internal Integration"
        - "  - Go to https://www.notion.so/my-integrations"
        - "  - Click '+ New integration'"
        - "  - Name: 'MCP Server Testing' (or any name)"
        - "  - Associated workspace: Select your workspace"
        - "  - Type: Internal integration (default)"
        - "  - Capabilities:"
        - "    ✅ Read content"
        - "    ✅ Update content"
        - "    ✅ Insert content"
        - "    ✅ Read comments (if testing comments)"
        - "    ✅ Insert comments (if testing comments)"
        - "  - Click 'Submit'"
        - ""
        - "Step 4: Copy Integration Token"
        - "  - After creation, you'll see the 'Internal Integration Secret'"
        - "  - Click 'Show' then 'Copy'"
        - "  - Token starts with 'ntn_'"
        - "  - This is your NOTION_API_KEY"
        - ""
        - "Step 5: Grant Integration Access to Test Page"
        - "  - Create test page: Click '+ New page', name it 'MCP Test Pages'"
        - "  - In integration settings (where you are now):"
        - "    - Click 'Content access' tab (next to Configuration)"
        - "    - Click 'Edit access' or '+ Add pages'"
        - "    - Search for and select your test page"
        - "    - Save"
        - "  - Done! Integration can now access page + all children"
        - ""
        - "Note: Internal integrations must be granted access from integration settings"
        - "Cannot add from page menu (that's for public integrations only)"
      notes:
        - "Internal integrations are scoped to a single workspace"
        - "No OAuth flow needed - just copy the token"
        - "Token is SECRET - never commit to version control"
        - "Save in datasets/notion/.env file (gitignored)"
        - "Token doesn't expire but can be rotated"
        - "Free Notion account is sufficient for testing"
        - "Can have multiple integrations per workspace"
        - "Integration name is for your reference only"
    validation: "^ntn_[a-zA-Z0-9_-]+$"
    example: "ntn_abc123def456ghi789jkl012mno345pqr678stu901"

# ==============================================================================
# OPTIONAL CREDENTIALS (none needed!)
# ==============================================================================

optional_credentials: {}

# ==============================================================================
# API CHARACTERISTICS
# ==============================================================================

sandbox_available: false
sandbox_url: "N/A"
sandbox_notes: |
  Notion does NOT have a dedicated sandbox/test environment.

  ❌ No Sandbox:
    - All API calls go to production Notion workspace
    - Tests create real pages, databases, blocks
    - No isolation from your actual workspace
    - No way to reset state between test runs

  ✅ Mitigation Strategies:
    - Create dedicated test workspace for API testing
    - Use descriptive names (e.g., "[TEST] My Page")
    - Automatic cleanup fixtures delete created resources
    - Archive instead of delete (Notion best practice)
    - Can manually clean up via Trash

  ✅ Test Infrastructure Features:
    - cleanup_tracker fixture archives pages/databases after tests
    - Even if test fails, cleanup still runs
    - Keeps workspace clean for repeated testing
    - See tests/CLEANUP.md for details

  Setup Recommendation:
    1. Create test workspace (free) separate from personal workspace
    2. Create integration associated with test workspace
    3. Run tests against test workspace only
    4. Workspace stays relatively clean with auto-cleanup

  No charges, no quotas for API calls on free plan!

rate_limits:
  general: "3 requests per second per integration"
  notes: |
    Notion rate limits:
      - 3 requests per second per integration (average)
      - Burst allowance: Can exceed briefly
      - Rate limit headers:
        - retry-after: Seconds to wait before retry
      - If rate limited: 429 status with retry-after
      - Backoff strategy: Exponential backoff recommended

    Test suite considerations:
      - Tests run sequentially (not parallel)
      - ~60-100 total requests across all scenarios
      - Well under rate limits with sequential execution
      - No special rate limit handling needed

cleanup_notes: |
  Notion cleanup strategy:

  ✅ Automatic Cleanup (via cleanup_tracker fixture):
    - All pages created during tests: ARCHIVED after test
    - All databases created during tests: ARCHIVED after test
    - Cleanup runs even if test fails
    - Uses Notion's archive (not delete)

  Why archive instead of delete:
    - Notion best practice (reversible)
    - Can recover from Trash if needed
    - Less destructive for debugging
    - Delete is permanent (30 day Trash period)

  Manual Cleanup:
    - View archived items in Trash
    - Permanently delete if desired
    - Or leave them - they don't affect workspace

  What can't be cleaned up:
    - Comments (Notion API doesn't support delete)
    - Search results (just querying, no persistence)
    - User objects (Notion-managed, can't delete)

  See tests/CLEANUP.md for implementation details.

