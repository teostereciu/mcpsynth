# ==============================================================================
# SECURITY NOTES
# ==============================================================================

security:
  api_key_storage: |
    - Store test key in .env file (gitignored)
    - Never commit API keys to version control
    - Use environment variables in production
    - Test keys start with sk_test_
    - Live keys start with sk_live_

  test_vs_live: |
    - ALWAYS use test keys for development/testing
    - Test mode is completely isolated from live mode
    - Test keys cannot access live data
    - Live keys cannot access test data
    - Dashboard shows which mode you're in (toggle top-right)

  safe_testing: |
    - Test mode is 100% safe - no real money involved
    - Can safely test all scenarios including refunds, disputes, etc.
    - Test card numbers will never be charged
    - No PCI compliance needed for test mode testing
    - All test data visible in Dashboard for verification

  publishable_keys: |
    - Publishable keys (pk_test_) are for client-side use
    - Secret keys (sk_test_) are for server-side only
    - This benchmark only needs secret key
    - Never expose secret keys in client-side code

