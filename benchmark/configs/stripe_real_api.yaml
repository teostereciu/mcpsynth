# Stripe API Real API Testing Configuration
#
# This config defines what's needed to test the Stripe MCP server against
# the real Stripe API in test mode.

api_name: "Stripe"
api_version: "API v1 + select v2 endpoints"
test_suite: "tests/test_scenarios.py"

# ==============================================================================
# REQUIRED CREDENTIALS
# ==============================================================================

required_credentials:
  STRIPE_API_KEY:
    description: "Stripe API secret key for test mode"
    how_to_get:
      url: "https://dashboard.stripe.com/test/apikeys"
      steps:
        - "Sign up for Stripe account at https://dashboard.stripe.com/register"
        - "Verify your email address"
        - "Log in to Stripe Dashboard"
        - "Click 'Developers' in the left sidebar"
        - "Click 'API keys'"
        - "Make sure you're in 'Test mode' (toggle in top-right)"
        - "Find the 'Secret key' row (NOT 'Publishable key')"
        - "Click 'Reveal test key' button or copy icon to reveal the full key"
        - "Copy the 'Secret key' (starts with sk_test_)"
        - "NEVER use the live key (sk_live_) for testing!"
      notes:
        - "NOTE: Stripe dashboard UI may have changed - look for 'Secret key' starting with sk_test_"
        - "You need the SECRET key (sk_test_...), NOT the publishable key (pk_test_...)"
        - "Secret key has full API access - publishable key is client-side only"
        - "Test mode is completely free - no charges ever"
        - "Test key works with all 502 API endpoints"
        - "Use test card numbers like 4242424242424242"
        - "All test data is isolated from production"
        - "No credit card required for test mode"
    validation: "^sk_test_[a-zA-Z0-9]{24,}$"
    example: "sk_test_51A1b2C3d4E5f6G7h8I9j0K1l2M3n4O5p6Q7r8S9t0U1v2W3x4Y5z6"

# ==============================================================================
# OPTIONAL CREDENTIALS (none needed!)
# ==============================================================================

optional_credentials: {}

# ==============================================================================
# API CHARACTERISTICS
# ==============================================================================

sandbox_available: true
sandbox_url: "https://api.stripe.com (same URL, use test key)"
sandbox_notes: |
  Stripe has EXCELLENT test mode support - the best of all payment APIs:

  ✅ Perfect Test Mode:
    - 100% API coverage - ALL 502 endpoints work in test mode
    - Same API URL (https://api.stripe.com)
    - Just use test API key instead of live key
    - Completely isolated - no impact on production
    - FREE forever - no charges, no credit card needed

  ✅ Test Data Available:
    - Test card numbers for all scenarios (success, decline, 3DS, etc.)
    - Pre-made test objects (pm_card_visa, tok_visa, etc.)
    - 44 dedicated test helper endpoints for simulations
    - Test webhooks and events

  ✅ Realistic Testing:
    - All payment flows work exactly like production
    - Subscriptions, invoices, refunds all function fully
    - Connect platform, issuing, treasury all testable
    - Webhooks fire in test mode

  ✅ Test Cards:
    - Success: 4242424242424242 (Visa)
    - Decline: 4000000000000002
    - Insufficient funds: 4000000000009995
    - Requires 3DS: 4000002500003155
    - 50+ country-specific test cards
    - All brands: Visa, Mastercard, Amex, Discover, JCB, etc.

  Setup Steps:
    1. Sign up at https://dashboard.stripe.com/register (2 min)
    2. Verify email
    3. Copy test API key from Developers → API keys
    4. Done!

  No sandbox limitations - everything works perfectly!

rate_limits:
  test_mode: "100 requests/second (very generous)"
  general: "Same rate limits as production"
  notes: |
    - Test mode: 100 requests per second by default
    - Almost never hit rate limits in testing
    - Rate limit headers included in responses:
      - X-RateLimit-Limit: Maximum requests allowed
      - X-RateLimit-Remaining: Requests remaining
      - X-RateLimit-Reset: Unix timestamp when limit resets
    - If rate limited: 429 status with retry-after header
    - Test suite uses <50 requests total - well under limits

cleanup_notes: |
  No cleanup needed for test mode:
    - All test data is isolated in test mode
    - Can delete test objects manually in dashboard if desired
    - Or leave them - they don't affect anything
    - No charges, no costs, no impact

  Test data persistence:
    - Test objects persist until manually deleted
    - Can view all test data in Stripe Dashboard (test mode)
    - Useful for debugging and verification
    - Can use dashboard to clean up if desired

